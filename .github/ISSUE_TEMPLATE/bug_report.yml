name: Bug Report
description: File a bug report to help improve the RTLAMR meter reader
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please include as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run '...'
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error output if applicable.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: e.g., Ubuntu 24.04, Debian 12, Raspberry Pi OS
    validations:
      required: true

  - type: input
    id: sdr
    attributes:
      label: SDR Dongle
      description: Model and USB ID (from `lsusb`)
      placeholder: "0bda:2838 RTL2838 DVB-T"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Output
      description: Paste any relevant rtlamr output, journalctl logs, or error messages
      render: shell
